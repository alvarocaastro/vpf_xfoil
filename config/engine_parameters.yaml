# Engine and mission parameters for the VPF analysis pipeline
# Reference engine: GE9X-105B1A (Boeing 777X) — BPR≈10, fan diameter 3.40 m

# ── Baseline engine performance ──────────────────────────────────────────────

# Cruise SFC [lb/(lbf·h)] — GE9X public value ~0.49–0.50
baseline_sfc: 0.50

# Baseline fan adiabatic efficiency — GE9X: ~0.90–0.92 (16-blade wide-chord)
fan_efficiency: 0.90

# High-bypass ratio — GE9X: BPR ≈ 10
bypass_ratio: 10.0

# ── SFC phase multipliers ────────────────────────────────────────────────────
# SFC at each flight phase relative to cruise (used by Stage 7 sfc_core.py).
# Values derived from typical turbofan part-power SFC behaviour (Walsh & Fletcher 2004).
sfc_multipliers:
  takeoff: 1.15   # Full thrust → near-ideal combustion but high fuel flow
  climb:   1.05   # Reduced thrust, slightly off peak thermal efficiency
  cruise:  1.00   # Design point — reference
  descent: 1.10   # Idle/low thrust → poor thermodynamic efficiency

# ── Efficiency transfer coefficient ─────────────────────────────────────────
# τ: fraction of 2D blade section efficiency gain that propagates to 3D fan η.
# Accounts for 3D losses (tip clearance, secondary flows, shocks) not captured
# by isolated-section XFOIL analysis. Typical range: 0.4–0.6.
# Ref: Cumpsty (2004), Compressor Aerodynamics, ch. 4.
profile_efficiency_transfer: 0.50

# ── Mission profile ───────────────────────────────────────────────────────────
# Reference mission: B777X medium-haul (~8.8 h block time, ~13 000 km).
# thrust_fraction: fraction of design_thrust_kN at each phase.
# duration_min:    typical phase duration [minutes].
mission:
  phases:
    takeoff:  {duration_min:   0.5, thrust_fraction: 1.00}
    climb:    {duration_min:  20.0, thrust_fraction: 0.75}
    cruise:   {duration_min: 480.0, thrust_fraction: 0.25}
    descent:  {duration_min:  25.0, thrust_fraction: 0.05}
  design_thrust_kN: 105.0        # GE9X-105B1A sea-level static thrust per engine [kN]
  fuel_price_usd_per_kg: 0.90    # Jet-A1 — IATA average 2023–2024 [USD/kg]

# ── Reverse thrust (Stage 6) ──────────────────────────────────────────────────
# VPF achieves reverse thrust by rotating blade pitch to negative angles while
# the fan keeps spinning in the same direction. No blocker doors or cascade ducts.
reverse_thrust:
  n1_fraction: 0.65          # Fan speed during reverse as fraction of design N1
  va_landing_m_s: 60.0       # Mean axial airspeed over ground roll [m/s]
                              # (reversers engaged at ~75 m/s, averaged to ~60 m/s)

  # Pitch sweep range (Δβ relative to β_metal_cruise from Stage 5)
  delta_beta_min_deg: -25.0  # Most negative offset
  delta_beta_max_deg:  -5.0  # Least negative (near feathering)
  delta_beta_steps: 41       # Number of sweep points

  # Performance criterion
  target_thrust_fraction: 0.40  # Required: |T_rev| ≥ 40% of forward takeoff thrust

  # Mechanism weight — basis for Stage 7 SFC cruise penalty.
  # VPF actuator (ring + pitch links + reinforced blade root): ~4% of engine dry weight.
  # Conventional cascade reverser (cascades + blocker doors + nacelle reinforcement): ~10%.
  # Net saving vs conventional: ~6% × dry weight × 2 engines ≈ 950 kg.
  engine_dry_weight_kg: 7930.0          # GE9X-1B dry weight per engine [kg]
  mechanism_weight_fraction: 0.04       # VPF actuator as fraction of engine dry weight
  conventional_reverser_fraction: 0.10  # Cascade reverser fraction for comparison
  aircraft_L_D: 18.0                    # B777X cruise lift-to-drag ratio
