# Engine and mission parameters for the VPF analysis pipeline
# Reference architecture: UHBPR direct-drive turbofan — BPR=15, FPR=1.30
# Baseline engine analogy: GE9X-105B1A (Boeing 777X), fan diameter 3.40 m (BPR≈10)

# ── Baseline engine performance ──────────────────────────────────────────────

# Cruise SFC [lb/(lbf·h)] — GE9X-105B1A public value (matches GE9X_PARAMS in engine_data.py)
baseline_sfc: 0.49

# Baseline fan adiabatic efficiency — GE9X: ~0.90–0.92 (16-blade wide-chord)
fan_efficiency: 0.90

# Ultra-high bypass ratio — UHBPR target: BPR = 15
bypass_ratio: 15.0

# Fan Pressure Ratio — reduced to 1.30 (UHBPR cruise design point, enabled by VPF)
# VPF prevents stall at low FPR during takeoff by adjusting blade pitch in real time.
fan_pressure_ratio: 1.30

# Direct-drive: fan is coupled directly to the LPT shaft (no planetary gearbox).
# gear_ratio = 1.0 → ω_fan = ω_shaft; fan RPM equals LPT RPM directly.
gear_ratio: 1.0

# ── SFC phase multipliers ────────────────────────────────────────────────────
# SFC at each flight phase relative to cruise (used by Stage 7 sfc_core.py).
# Values derived from typical turbofan part-power SFC behaviour.
# Refs: Walsh & Fletcher (2004), Gas Turbine Performance, ch. 9, figs 9.19–9.22.
#       Saravanamuttoo et al. (2017), Gas Turbine Theory, §5.3.
sfc_multipliers:
  takeoff: 1.15   # Full thrust → near-ideal combustion but high fuel flow
  climb:   1.05   # Reduced thrust, slightly off peak thermal efficiency
  cruise:  1.00   # Design point — reference
  descent: 1.60   # Idle/low thrust (thrust_fraction=0.05): SFC rises steeply.
                  # At ~5% thrust the engine operates far off its thermodynamic
                  # design point. Typical range: 1.5–2.0 × SFC_cruise.
                  # Value 1.60 is the central estimate from Walsh & Fletcher
                  # (2004) fig. 9.20 at N1 ≈ 60–65 % (flight idle).
  hold:    1.08   # Level hold, Mach 0.5, 20 000 ft — part-power, near-idle thrust.
                  # Lower penalty than descent because N1 is higher (~70–75 %).
                  # VPF advantage is largest here (~11–16 % fuel saving) due to
                  # off-design incidence correction at low flight speed.

# ── Efficiency transfer coefficient ─────────────────────────────────────────
# τ: fraction of 2D blade section efficiency gain that propagates to 3D fan η.
# Accounts for 3D losses (tip clearance, secondary flows, shocks) not captured
# by isolated-section XFOIL analysis. Typical range: 0.4–0.6.
# Ref: Cumpsty (2004), Compressor Aerodynamics, ch. 4.
profile_efficiency_transfer: 0.50

# ── Mission profile ───────────────────────────────────────────────────────────
# Reference mission: B777X medium-haul (~8.8 h block time, ~13 000 km).
# thrust_fraction: fraction of design_thrust_kN at each phase.
# duration_min:    typical phase duration [minutes].
mission:
  phases:
    takeoff:  {duration_min:   0.5, thrust_fraction: 1.00}
    climb:    {duration_min:  20.0, thrust_fraction: 0.75}
    cruise:   {duration_min: 480.0, thrust_fraction: 0.25}
    descent:  {duration_min:  25.0, thrust_fraction: 0.05}
    hold:     {duration_min:  60.0, thrust_fraction: 0.12}  # Mach 0.5, 20 000 ft, 60 min
  design_thrust_kN: 467.0        # GE9X-105B1A sea-level static thrust per engine [kN]
                                 # 105,000 lbf × 4.448 N/lbf = 467,040 N = 467 kN
                                 # Source: EASA TCDS E.110 / FAA TCDS E00078NE
  fuel_price_usd_per_kg: 0.90    # Jet-A1 — IATA average 2023–2024 [USD/kg]

# ── Fleet CO₂ annualisation ───────────────────────────────────────────────────
# Used by Stage 7 to extrapolate per-mission CO₂ saving to fleet level.
fleet_co2:
  aircraft_count: 100                  # Representative operator fleet size
  flights_per_day_per_aircraft: 2      # Typical medium/long-haul utilisation

# ── Reverse thrust (Stage 6) ──────────────────────────────────────────────────
# Stage 6 computes mechanism weight and SFC cruise penalty only.
# No aerodynamic sweep is performed (requires validated post-stall polars).
# See docs/design_decisions.md §9 for rationale.
reverse_thrust:
  # Mechanism weight — basis for Stage 7 SFC cruise penalty.
  # Sources:
  #   engine_dry_weight_kg : EASA TCDS E.110 (GE9X-1B, rev. 10) — 8 276 kg (18 247 lb)
  #   conventional_reverser: full cascade TRU system (blocker doors, D-duct, actuator
  #                          fairings) ≈ 9.5 % of engine dry weight (≈ 786 kg/engine).
  #                          Ref: Howe (2000), Aircraft Conceptual Design Synthesis;
  #                               Leylekian et al. (2014) nacelle weight breakdown.
  #   aircraft_L_D         : B777X cruise L/D ≈ 20–21 (GE/Boeing public data).
  engine_dry_weight_kg: 8276.0          # GE9X-1B dry weight per engine [kg] — EASA TCDS E.110
  mechanism_weight_fraction: 0.04       # VPF pitch-change mechanism ≈ 4 % of engine dry weight
  conventional_reverser_fraction: 0.095 # Cascade TRU elimination credit ≈ 9.5 % of engine dry weight
  aircraft_L_D: 20.5                    # B777X cruise lift-to-drag ratio

  # Fan diameter scaling — D^2.5 law (Raymer 2018; Roskam Vol. V).
  # fan_diameter_ratio = sqrt(BPR_uhbpr / BPR_ref) = sqrt(15/10) ≈ 1.224
  fan_diameter_ratio: 1.224            # D_uhbpr/D_ref; ref BPR≈10, target BPR=15
