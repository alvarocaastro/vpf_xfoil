# Configuration file for VFP Aerodynamic Analysis Pipeline
# This file contains all simulation parameters and output settings

# Reference Mach number for XFOIL simulations (incompressible baseline)
reference_mach: 0.2

# Target Mach numbers for compressibility correction (per flight condition)
target_mach:
  takeoff: 0.30
  climb: 0.70
  cruise: 0.85
  descent: 0.75

# Reynolds numbers for each flight condition and blade section
reynolds:
  takeoff:
    root: 2.5e6
    mid_span: 4.5e6
    tip: 7.0e6
  climb:
    root: 2.2e6
    mid_span: 4.0e6
    tip: 6.2e6
  cruise:
    root: 1.8e6
    mid_span: 3.2e6
    tip: 5.0e6
  descent:
    root: 2.0e6
    mid_span: 3.6e6
    tip: 5.6e6

# Ncrit (transition parameter) for each flight condition
# Lower values (4-6) = more turbulent (turbomachinery)
# Higher values (~9) = clean wind tunnel conditions
ncrit:
  takeoff: 5.0
  climb: 6.0
  cruise: 7.0
  descent: 6.0

# Angle of attack range for simulations
alpha:
  min: -5.0
  max: 23.0
  step: 0.15

# Angle of attack range for airfoil selection stage
selection_alpha:
  min: -5.0
  max: 20.0
  step: 0.15

# Selection stage parameters
selection:
  reynolds: 3.0e6
  ncrit: 7.0

# Output directories (relative to project root)
output:
  # Stage 4 — métricas y figuras de publicación
  figures: results/stage4_performance_metrics/figures/publication
  polars: results/stage2_xfoil_simulations/polars
  tables: results/stage4_performance_metrics/tables
  compressibility: results/stage3_compressibility_correction
  airfoil_selection: results/stage1_airfoil_selection/airfoil_selection
  # Stage 5 — paso óptimo y cinemática (antes stage6 + stage7)
  figures_pitch_kinematics: results/stage5_pitch_kinematics/figures
  tables_pitch_kinematics: results/stage5_pitch_kinematics/tables
  pitch_kinematics_summary: results/stage5_pitch_kinematics/pitch_kinematics_summary.txt
  # Stage 6 — análisis SFC (antes stage8)
  figures_sfc: results/stage6_sfc_analysis/figures
  tables_sfc: results/stage6_sfc_analysis/tables
  sfc_analysis_summary: results/stage6_sfc_analysis/sfc_analysis_summary.txt

# Plot settings
plotting:
  dpi: 300
  format: png
  figure_size:
    width: 6.0
    height: 4.5
  style:
    grid: true
    grid_alpha: 0.7
    grid_linestyle: ":"
    linewidth: 1.6

# Flight conditions
flight_conditions:
  - takeoff
  - climb
  - cruise
  - descent

# Blade sections
blade_sections:
  - root
  - mid_span
  - tip

# Airfoil geometry parameters for compressibility corrections
airfoil_geometry:
  thickness_ratio: 0.10   # t/c — NACA 65-410 (10% thick)
  korn_kappa: 0.87        # Korn's equation factor for NACA 6-series conventional airfoils

# Fan geometry (hypothetical reference fan for velocity triangle analysis)
fan_geometry:
  rpm: 4500               # Design rotational speed [RPM]
  radius:
    root: 0.20            # Blade radius at root section [m]
    mid_span: 0.42        # Blade radius at mid-span section [m]
    tip: 0.65             # Blade radius at tip section [m]
  axial_velocity:         # Axial flow velocity Va [m/s] per flight condition
    takeoff: 180.0
    climb: 220.0
    cruise: 250.0
    descent: 200.0

# Blade geometry for cascade and rotational correction analysis
# Based on a representative high-bypass turbofan fan (hypothetical reference)
blade_geometry:
  num_blades: 18          # Number of fan blades Z
  chord:                  # Blade chord c [m] per section
    root: 0.12
    mid_span: 0.10
    tip: 0.08
  theta_camber_deg: 8.0   # Camber angle θ [°] — NACA 65-410 representative value
                          # (Carter's rule: m=0.23 for NACA 6-series, a/c=0.5)
